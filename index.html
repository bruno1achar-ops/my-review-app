<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Serverless Data Extractor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/mountable.js"></script>
    <script>
      stlite.mount(
        {
          requirements: ["pandas", "pypdf"],
          entrypoint: "app.py",
          files: {
            "app.py": `
import streamlit as st
import pandas as pd
from pypdf import PdfReader
import io
import re

st.set_page_config(page_title="Local Review Assistant", layout="wide")
st.title("🔬 100% Offline Data Extractor")
st.caption("⚡ Completely serverless — runs entirely in your local browser engine with no API limits")

st.sidebar.header("⚙️ Local Extraction Rule Settings")
keywords_raw = st.sidebar.text_area("Target Extraction Terms (one per line):", "Sample Size\\nDesign\\nCountry")
target_keywords = [k.strip() for k in keywords_raw.split("\\n") if k.strip()]

uploaded_files = st.file_uploader("Upload PDF Papers", type=["pdf"], accept_multiple_files=True)

if uploaded_files:
    matrix_data = []
    with st.spinner("Processing files locally..."):
        for f in uploaded_files:
            try:
                pdf_bytes = f.read()
                reader = PdfReader(io.BytesIO(pdf_bytes))
                full_text = ""
                for page in reader.pages:
                    t = page.extract_text()
                    if t: 
                        full_text += t + "\\n"
                
                entry = {"File Name": f.name}
                for kw in target_keywords:
                    pattern = re.compile(r'([^.\\n]*?' + re.escape(kw) + r'[^.\\n]*)', re.IGNORECASE)
                    matches = pattern.findall(full_text)
                    if matches:
                        entry[kw] = matches[0].strip()[:150]
                    else:
                        entry[kw] = "Not discovered"
                matrix_data.append(entry)
            except Exception as e:
                matrix_data.append({"File Name": f.name, "Error": str(e)})
            
    if matrix_data:
        df_matrix = pd.DataFrame(matrix_data)
        st.subheader("📊 Locally Processed Extraction Grid")
        st.dataframe(df_matrix)
        csv_bytes = df_matrix.to_csv(index=False).encode('utf-8')
        st.download_button("📥 Save Matrix Data as CSV", data=csv_bytes, file_name="local_extraction_output.csv", mime="text/csv")
`
          }
        },
        document.getElementById("root")
      );
    </script>
  </body>
</html>
